version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      "${DB_PORT}:5432"
    volumes:
      - db_data: "/var/lib/postgresql/data"
    networks:
      - login_network